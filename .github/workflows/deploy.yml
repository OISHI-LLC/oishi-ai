name: Deploy to Xserver

on:
  push:
    branches:
      - master
    paths-ignore:
      - "tasks/**"
      - ".github/**"
      - ".claude/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "CODEX_ONLY.md"
      - "PROJECT_RULES.md"
      - "**/*.md"
      - ".DS_Store"
  workflow_dispatch:

concurrency:
  group: deploy-xserver-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: /oishillc.jp/public_html/wp-content/themes/oishi-ai/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/tasks/**
            **/preview/**
            **/*.md
            **/CLAUDE.md
            **/AGENTS.md
            **/CODEX_ONLY.md
            **/PROJECT_RULES.md
            **/.env
            **/.env.*
            **/.env.example
            **/.DS_Store
