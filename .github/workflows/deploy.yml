name: Deploy to Xserver

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.XSERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.XSERVER_PORT }} ${{ secrets.XSERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.XSERVER_PORT }} -o StrictHostKeyChecking=no" \
            --include='style.css' \
            --include='functions.php' \
            --include='index.php' \
            --include='home.php' \
            --include='single.php' \
            --include='page-portfolio.php' \
            --exclude='*' \
            ./ \
            ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:/home/xs544387/oishillc.jp/public_html/wp-content/themes/oishi-ai/
