name: Deploy to Xserver

on:
  push:
    branches:
      - master
    paths-ignore:
      - "tasks/**"
      - ".github/**"
      - ".claude/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "CODEX_ONLY.md"
      - "PROJECT_RULES.md"
      - "**/*.md"
      - ".DS_Store"
  workflow_dispatch:

concurrency:
  group: deploy-xserver-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deployable changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          if [[ -z "$before" || "$before" == "0000000000000000000000000000000000000000" ]]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$before" "$after")

          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for file in "${changed_files[@]}"; do
            if [[ "$file" == tasks/* \
              || "$file" == .github/* \
              || "$file" == .claude/* \
              || "$file" == AGENTS.md \
              || "$file" == CLAUDE.md \
              || "$file" == CODEX_ONLY.md \
              || "$file" == PROJECT_RULES.md \
              || "$file" == .DS_Store \
              || "$file" == *.md ]]; then
              continue
            fi

            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          done

          echo "should_deploy=false" >> "$GITHUB_OUTPUT"

      - name: Skip deploy for docs-only push
        if: steps.changes.outputs.should_deploy != 'true'
        run: echo "No deployable file changes detected; skipping FTP deploy."

      - name: Deploy via FTPS
        if: steps.changes.outputs.should_deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: /oishillc.jp/public_html/wp-content/themes/oishi-ai/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.claude/**
            **/tasks/**
            **/preview/**
            **/*.md
            **/CLAUDE.md
            **/AGENTS.md
            **/CODEX_ONLY.md
            **/PROJECT_RULES.md
            **/.env
            **/.env.*
            **/.env.example
            **/.DS_Store
