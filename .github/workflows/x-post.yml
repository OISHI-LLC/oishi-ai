name: X Auto Post

on:
  schedule:
    # 毎日 JST 08:00 / 12:00 / 19:00 に固定実行
    # キュー内の scheduled <= 現在時刻 かつ status=pending のみ投稿
    - cron: "0 23 * * *"   # JST 08:00
    - cron: "0 3 * * *"    # JST 12:00
    - cron: "0 10 * * *"   # JST 19:00
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install tweepy

      - name: Post scheduled tweets
        id: post_tweets
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/x-post.py

      - name: Commit queue updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet tasks/x-content-queue.json || {
            git add tasks/x-content-queue.json
            git commit -m "chore: update X post queue status"
            git push
          }

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "X Auto Post failed ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --body "$(cat <<'BODY'
          ## X Auto Post ワークフローが失敗しました

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          キュー内のツイートが投稿されていない可能性があります。
          手動で確認・再実行してください。

          `gh workflow run "X Auto Post"`
          BODY
          )" \
            --label "bug"
