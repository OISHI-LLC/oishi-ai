name: X Auto Post

on:
  schedule:
    # Run 5x daily:
    # - 07:03 JST / 17:03 JST existing cadence
    # - 20:30 JST / 22:30 JST / 23:50 JST evening article promotion cadence
    - cron: "3 22,8 * * *"
    - cron: "30 11 * * *"
    - cron: "30 13 * * *"
    - cron: "50 14 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install tweepy

      - name: Post scheduled tweets
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/x-post.py

      - name: Commit queue updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet tasks/x-content-queue.json || {
            git add tasks/x-content-queue.json
            git commit -m "chore: update X post queue status"
            git push
          }
