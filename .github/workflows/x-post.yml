name: X Auto Post

on:
  schedule:
    # 2026-03-14: 08:00 JST, 12:00 JST, 15:00 JST
    - cron: "0 3 14 3 *"
    - cron: "0 6 14 3 *"
    # 2026-03-15: 07:00 JST, 11:00 JST, 15:00 JST
    - cron: "0 22 14 3 *"
    - cron: "0 2 15 3 *"
    - cron: "0 6 15 3 *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install tweepy

      - name: Post scheduled tweets
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/x-post.py

      - name: Commit queue updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet tasks/x-content-queue.json || {
            git add tasks/x-content-queue.json
            git commit -m "chore: update X post queue status"
            git push
          }
