name: X Auto Post

on:
  schedule:
    # 2026-03-13: 20:50 JST, 21:55 JST, 23:23 JST
    - cron: "50 11 13 3 *"
    - cron: "55 12 13 3 *"
    - cron: "23 14 13 3 *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install tweepy

      - name: Post scheduled tweets
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/x-post.py

      - name: Commit queue updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet tasks/x-content-queue.json || {
            git add tasks/x-content-queue.json
            git commit -m "chore: update X post queue status"
            git push
          }
