name: X Auto Post

on:
  schedule:
    # Run 2x daily: 07:00 JST (22:00 UTC) and 17:00 JST (08:00 UTC)
    # GitHub Actions free: 2,000 min/month. This uses ~60 min/month (3%).
    - cron: "3 22,8 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install tweepy

      - name: Post scheduled tweets
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python scripts/x-post.py

      - name: Commit queue updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet tasks/x-content-queue.json || {
            git add tasks/x-content-queue.json
            git commit -m "chore: update X post queue status"
            git push
          }
