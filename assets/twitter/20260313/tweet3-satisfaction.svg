<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>

  <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#F8FAFC">AIコーディングツール 開発者満足度 2026</text>

  <!-- Bar 1: Claude Code -->
  <text x="80" y="180" font-family="sans-serif" font-size="34" font-weight="bold" fill="#FBBF24">Claude Code</text>
  <rect x="80" y="200" width="920" height="55" rx="10" fill="#FBBF24" opacity="0.9"/>
  <text x="1020" y="240" font-family="sans-serif" font-size="40" font-weight="bold" fill="#FBBF24">46%</text>

  <!-- Bar 2: Cursor -->
  <text x="80" y="310" font-family="sans-serif" font-size="34" font-weight="bold" fill="#10B981">Cursor</text>
  <rect x="80" y="330" width="380" height="55" rx="10" fill="#10B981" opacity="0.9"/>
  <text x="480" y="370" font-family="sans-serif" font-size="40" font-weight="bold" fill="#10B981">19%</text>

  <!-- Bar 3: GitHub Copilot -->
  <text x="80" y="440" font-family="sans-serif" font-size="34" font-weight="bold" fill="#60A5FA">GitHub Copilot</text>
  <rect x="80" y="460" width="180" height="55" rx="10" fill="#60A5FA" opacity="0.9"/>
  <text x="280" y="500" font-family="sans-serif" font-size="40" font-weight="bold" fill="#60A5FA">9%</text>

  <!-- Insight -->
  <line x1="100" y1="555" x2="1100" y2="555" stroke="#475569" stroke-width="1"/>
  <text x="600" y="605" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#94A3B8">満足度1位 = ユーザー数1位 ではない</text>
  <text x="600" y="650" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#FBBF24">満足度と利用者数は別の話。目的で選ぶ時代。</text>
</svg>
