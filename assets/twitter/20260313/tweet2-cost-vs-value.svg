<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <text x="600" y="75" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="bold" fill="#F8FAFC">AIツールは「月額」で選ぶな</text>
  <text x="600" y="125" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#94A3B8">「削減時間 x 時給」で考える</text>

  <!-- Left: Cheap -->
  <rect x="60" y="170" width="510" height="350" rx="20" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <text x="315" y="220" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#60A5FA">ツールA  $10/月</text>
  <text x="315" y="275" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#94A3B8">1日30分の作業短縮</text>
  <text x="315" y="330" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="#60A5FA">月15時間</text>
  <text x="315" y="380" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#94A3B8">時給1,000円換算</text>
  <text x="315" y="425" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#60A5FA">= 15,000円の価値</text>
  <text x="315" y="480" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#94A3B8">投資対効果 10倍</text>

  <!-- Right: Expensive -->
  <rect x="630" y="170" width="510" height="350" rx="20" fill="#1E293B" stroke="#10B981" stroke-width="3"/>
  <text x="885" y="220" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#10B981">ツールB  $20/月</text>
  <text x="885" y="275" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#94A3B8">1日2時間の自動化</text>
  <text x="885" y="330" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="#10B981">月40時間</text>
  <text x="885" y="380" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#94A3B8">時給1,000円換算</text>
  <text x="885" y="425" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#10B981">= 40,000円の価値</text>
  <text x="885" y="480" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#94A3B8">投資対効果 13倍</text>

  <!-- Bottom -->
  <text x="600" y="580" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#FBBF24">$10多く払って、25時間多く浮く</text>
  <text x="600" y="635" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#94A3B8">安い = お得 とは限らない</text>
</svg>
