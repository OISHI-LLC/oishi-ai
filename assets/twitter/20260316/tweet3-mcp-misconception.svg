<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="65" text-anchor="middle" fill="#f1f5f9" font-size="38" font-weight="bold">MCPは開発者だけのもの？</text>
  <text x="600" y="105" text-anchor="middle" fill="#ef4444" font-size="30" font-weight="bold">→ よくある誤解です</text>

  <!-- What MCP enables -->
  <text x="600" y="170" text-anchor="middle" fill="#94a3b8" font-size="24">MCPのおかげで「あなたが」できるようになったこと</text>

  <!-- 3 cards -->
  <rect x="50" y="200" width="350" height="180" rx="14" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="2"/>
  <text x="225" y="255" text-anchor="middle" fill="#3b82f6" font-size="30" font-weight="bold">ファイル操作</text>
  <text x="225" y="295" text-anchor="middle" fill="#94a3b8" font-size="22">AIがローカルの</text>
  <text x="225" y="325" text-anchor="middle" fill="#94a3b8" font-size="22">ファイルを直接読み書き</text>
  <text x="225" y="365" text-anchor="middle" fill="#60a5fa" font-size="18">Claude Desktop / ChatGPT</text>

  <rect x="425" y="200" width="350" height="180" rx="14" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="255" text-anchor="middle" fill="#22c55e" font-size="30" font-weight="bold">ツール連携</text>
  <text x="600" y="295" text-anchor="middle" fill="#94a3b8" font-size="22">カレンダー・メール・</text>
  <text x="600" y="325" text-anchor="middle" fill="#94a3b8" font-size="22">Slackと自動で接続</text>
  <text x="600" y="365" text-anchor="middle" fill="#86efac" font-size="18">日常業務の自動化</text>

  <rect x="800" y="200" width="350" height="180" rx="14" fill="#a855f7" fill-opacity="0.1" stroke="#a855f7" stroke-width="2"/>
  <text x="975" y="255" text-anchor="middle" fill="#a855f7" font-size="30" font-weight="bold">データ検索</text>
  <text x="975" y="295" text-anchor="middle" fill="#94a3b8" font-size="22">社内DBや外部サービスを</text>
  <text x="975" y="325" text-anchor="middle" fill="#94a3b8" font-size="22">AIが横断的に検索</text>
  <text x="975" y="365" text-anchor="middle" fill="#c4b5fd" font-size="18">情報収集を効率化</text>

  <!-- Key message -->
  <rect x="100" y="420" width="1000" height="100" rx="14" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="462" text-anchor="middle" fill="#22c55e" font-size="28" font-weight="bold">「使う側」は技術を知らなくてOK</text>
  <text x="600" y="500" text-anchor="middle" fill="#86efac" font-size="22">ただし「選ぶ側」はMCP対応かどうかを知っておくべき</text>

  <!-- Bottom -->
  <text x="600" y="570" text-anchor="middle" fill="#94a3b8" font-size="22">MCP対応ツールを選ぶかどうかで</text>
  <text x="600" y="605" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="bold">AIの活用幅がまったく変わる</text>

  <text x="600" y="655" text-anchor="middle" fill="#475569" font-size="18">AI Lab OISHI</text>
</svg>