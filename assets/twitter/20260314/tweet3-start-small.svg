<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg2)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent2)"/>

  <!-- Title -->
  <text x="600" y="68" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#F8FAFC">AI導入で一番もったいない失敗</text>

  <!-- VS Layout -->
  <!-- LEFT: Failure pattern -->
  <rect x="40" y="100" width="540" height="440" rx="16" fill="url(#failGrad)" stroke="#EF4444" stroke-width="2" stroke-opacity="0.3"/>

  <!-- X icon -->
  <circle cx="310" cy="145" r="24" fill="#EF4444" opacity="0.2"/>
  <text x="310" y="155" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#EF4444">X</text>

  <text x="310" y="195" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#F87171">大きく構えるパターン</text>

  <!-- Fail steps -->
  <rect x="70" y="220" width="480" height="52" rx="10" fill="#1E293B"/>
  <text x="310" y="253" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#94A3B8">「まず全社で導入計画を立てよう」</text>

  <!-- Arrow -->
  <text x="310" y="290" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#475569">|</text>

  <rect x="70" y="300" width="480" height="52" rx="10" fill="#1E293B"/>
  <text x="310" y="333" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#94A3B8">会議が増え、検討期間が延びる</text>

  <!-- Arrow -->
  <text x="310" y="370" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#475569">|</text>

  <rect x="70" y="380" width="480" height="52" rx="10" fill="#1E293B"/>
  <text x="310" y="413" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#94A3B8">半年経っても何も変わらない</text>

  <!-- Result -->
  <rect x="70" y="455" width="480" height="60" rx="12" fill="#7F1D1D" opacity="0.4"/>
  <text x="310" y="493" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#FCA5A5">結果：競合に差をつけられる</text>

  <!-- RIGHT: Success pattern -->
  <rect x="620" y="100" width="540" height="440" rx="16" fill="url(#successGrad)" stroke="#10B981" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Check icon -->
  <circle cx="890" cy="145" r="24" fill="#10B981" opacity="0.2"/>
  <text x="890" y="156" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#10B981">OK</text>

  <text x="890" y="195" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#34D399">小さく始めるパターン</text>

  <!-- Success steps -->
  <rect x="650" y="220" width="480" height="52" rx="10" fill="#1E293B"/>
  <text x="890" y="253" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#D1D5DB">1人が、1つのツールを、1つの業務に</text>

  <!-- Arrow -->
  <text x="890" y="290" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#475569">|</text>

  <rect x="650" y="300" width="480" height="52" rx="10" fill="#1E293B"/>
  <text x="890" y="333" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#D1D5DB">「これは便利だ」と実感が生まれる</text>

  <!-- Arrow -->
  <text x="890" y="370" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#475569">|</text>

  <rect x="650" y="380" width="480" height="52" rx="10" fill="#1E293B"/>
  <text x="890" y="413" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#D1D5DB">自然と使う場面が広がっていく</text>

  <!-- Result -->
  <rect x="650" y="455" width="480" height="60" rx="12" fill="#064E3B" opacity="0.4"/>
  <text x="890" y="493" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#6EE7B7">結果：月3,000円で業務が変わる</text>

  <!-- VS badge -->
  <circle cx="600" cy="320" r="32" fill="#1E293B" stroke="#475569" stroke-width="2"/>
  <text x="600" y="330" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#F8FAFC">VS</text>

  <!-- Bottom message -->
  <rect x="200" y="565" width="800" height="60" rx="14" fill="#1E3A5F" opacity="0.5"/>
  <text x="600" y="603" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#FBBF24">大きく構えず、まず明日の朝1つ試す</text>

  <!-- Footer -->
  <text x="600" y="660" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#475569">oishillc.jp</text>
</svg>
