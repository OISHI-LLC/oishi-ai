<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="barBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="barEmpty" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="bold" fill="#F8FAFC">日本企業の生成AI利用率</text>

  <!-- Big number -->
  <text x="600" y="160" text-anchor="middle" font-family="sans-serif" font-size="96" font-weight="bold" fill="#3B82F6">55.2%</text>
  <text x="600" y="200" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#94A3B8">ただし「積極活用」はまだ約半数</text>

  <!-- Progress bar -->
  <rect x="120" y="230" width="960" height="32" rx="16" fill="url(#barBg)"/>
  <rect x="120" y="230" width="530" height="32" rx="16" fill="url(#barFill)"/>
  <rect x="650" y="230" width="430" height="32" rx="16" fill="url(#barEmpty)" opacity="0.3"/>
  <text x="385" y="253" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">利用中 55.2%</text>
  <text x="865" y="253" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#F87171">未利用 44.8%</text>

  <!-- Divider -->
  <line x1="120" y1="295" x2="1080" y2="295" stroke="#334155" stroke-width="1"/>

  <!-- Barrier section -->
  <text x="600" y="340" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="#F8FAFC">最大の壁：「AIに詳しい人がいない」</text>

  <!-- Arrow down -->
  <path d="M600,365 L580,385 L620,385 Z" fill="#3B82F6"/>

  <!-- But actually... -->
  <rect x="120" y="400" width="960" height="240" rx="16" fill="#1E3A5F" opacity="0.6"/>
  <text x="600" y="445" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="#60A5FA">でも、今のAIに専門知識は不要</text>

  <!-- 3 examples -->
  <!-- Example 1 -->
  <rect x="150" y="470" width="280" height="80" rx="12" fill="#0F172A" opacity="0.6"/>
  <text x="290" y="502" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#F8FAFC">資料作成</text>
  <text x="290" y="535" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#94A3B8">「会議資料を作って」</text>

  <!-- Example 2 -->
  <rect x="460" y="470" width="280" height="80" rx="12" fill="#0F172A" opacity="0.6"/>
  <text x="600" y="502" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#F8FAFC">競合リサーチ</text>
  <text x="600" y="535" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#94A3B8">「競合を調べて」</text>

  <!-- Example 3 -->
  <rect x="770" y="470" width="280" height="80" rx="12" fill="#0F172A" opacity="0.6"/>
  <text x="910" y="502" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#F8FAFC">メール下書き</text>
  <text x="910" y="535" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#94A3B8">「返信を書いて」</text>

  <!-- Bottom message -->
  <text x="600" y="605" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#FBBF24">使いこなせれば、差は広がる</text>

  <!-- Source -->
  <text x="600" y="655" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#475569">出典：総務省「令和7年版 情報通信白書」</text>
</svg>
