<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="gemG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="claG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="gptG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="65" text-anchor="middle" fill="#f1f5f9" font-size="42" font-weight="bold">チーム利用で差がつく月額コスト</text>
  <text x="600" y="108" text-anchor="middle" fill="#94a3b8" font-size="26">個人は同額でも、20人チームだと年間18万円の差</text>

  <!-- Legend -->
  <rect x="270" y="130" width="660" height="48" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="310" y="142" width="22" height="22" rx="4" fill="url(#gemG)"/>
  <text x="342" y="160" fill="#4285f4" font-size="24" font-weight="bold">Gemini</text>
  <rect x="500" y="142" width="22" height="22" rx="4" fill="url(#claG)"/>
  <text x="532" y="160" fill="#d97706" font-size="24" font-weight="bold">Claude</text>
  <rect x="700" y="142" width="22" height="22" rx="4" fill="url(#gptG)"/>
  <text x="732" y="160" fill="#10a37f" font-size="24" font-weight="bold">GPT-5.4</text>

  <!-- Section: 個人 -->
  <text x="300" y="240" text-anchor="middle" fill="#e2e8f0" font-size="32" font-weight="bold">個人（1人）</text>

  <rect x="100" y="265" width="400" height="55" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="300" y="300" text-anchor="middle" fill="#f1f5f9" font-size="30" font-weight="bold">3社とも 約¥3,000/月</text>
  <text x="300" y="350" text-anchor="middle" fill="#64748b" font-size="24">→ ほぼ差なし</text>

  <!-- Section: 20人チーム -->
  <text x="900" y="240" text-anchor="middle" fill="#e2e8f0" font-size="32" font-weight="bold">20人チーム</text>

  <!-- Gemini bar -->
  <rect x="640" y="270" width="320" height="50" rx="8" fill="url(#gemG)" filter="url(#shadow)"/>
  <text x="655" y="303" fill="#fff" font-size="26" font-weight="bold">Gemini</text>
  <text x="945" y="303" text-anchor="end" fill="#fff" font-size="26" font-weight="bold">¥60,000</text>

  <!-- Claude bar -->
  <rect x="640" y="335" width="400" height="50" rx="8" fill="url(#claG)" filter="url(#shadow)"/>
  <text x="655" y="368" fill="#fff" font-size="26" font-weight="bold">Claude</text>
  <text x="1025" y="368" text-anchor="end" fill="#fff" font-size="26" font-weight="bold">¥75,000</text>

  <!-- GPT bar -->
  <rect x="640" y="400" width="400" height="50" rx="8" fill="url(#gptG)" filter="url(#shadow)"/>
  <text x="655" y="433" fill="#fff" font-size="26" font-weight="bold">GPT-5.4</text>
  <text x="1025" y="433" text-anchor="end" fill="#fff" font-size="26" font-weight="bold">¥75,000</text>

  <!-- Difference callout -->
  <rect x="700" y="470" width="280" height="50" rx="12" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <text x="840" y="503" text-anchor="middle" fill="#fca5a5" font-size="26" font-weight="bold">年間 ¥180,000 の差</text>

  <!-- Bottom message -->
  <rect x="100" y="555" width="1000" height="80" rx="14" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.5"/>
  <text x="600" y="590" text-anchor="middle" fill="#a5b4fc" font-size="26" font-weight="bold">ただし「安い＝正解」ではない</text>
  <text x="600" y="622" text-anchor="middle" fill="#818cf8" font-size="22">削減できる時間も含めてトータルで判断するのがおすすめ</text>
</svg>
