<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <filter id="sh4" x="-2%" y="-5%" width="104%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg4)" rx="12"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">価格帯マップ - 各モデルの価格レンジ</text>
  <!-- Price axis -->
  <line x1="140" y1="340" x2="760" y2="340" stroke="#adb5bd" stroke-width="2"/>
  <!-- Tick marks -->
  <line x1="140" y1="335" x2="140" y2="345" stroke="#adb5bd" stroke-width="2"/>
  <text x="140" y="365" text-anchor="middle" font-size="11" fill="#868e96">0円</text>
  <line x1="264" y1="335" x2="264" y2="345" stroke="#adb5bd" stroke-width="2"/>
  <text x="264" y="365" text-anchor="middle" font-size="11" fill="#868e96">10万円</text>
  <line x1="388" y1="335" x2="388" y2="345" stroke="#adb5bd" stroke-width="2"/>
  <text x="388" y="365" text-anchor="middle" font-size="11" fill="#868e96">20万円</text>
  <line x1="512" y1="335" x2="512" y2="345" stroke="#adb5bd" stroke-width="2"/>
  <text x="512" y="365" text-anchor="middle" font-size="11" fill="#868e96">30万円</text>
  <line x1="636" y1="335" x2="636" y2="345" stroke="#adb5bd" stroke-width="2"/>
  <text x="636" y="365" text-anchor="middle" font-size="11" fill="#868e96">40万円</text>
  <line x1="760" y1="335" x2="760" y2="345" stroke="#adb5bd" stroke-width="2"/>
  <text x="760" y="365" text-anchor="middle" font-size="11" fill="#868e96">50万円+</text>
  <!-- MacBook Neo bar: 99,800 ~ 154,800 -->
  <text x="30" y="95" font-size="13" font-weight="bold" fill="#343a40">MacBook Neo</text>
  <rect x="264" y="78" width="68" height="30" fill="#4ecdc4" rx="6" filter="url(#sh4)"/>
  <text x="298" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">9.9〜15.5万</text>
  <!-- price label -->
  <text x="264" y="122" font-size="10" fill="#4ecdc4" font-weight="bold">99,800円</text>
  <!-- MacBook Air bar: 184,800 ~ 324,800 -->
  <text x="30" y="175" font-size="13" font-weight="bold" fill="#343a40">MacBook Air M5</text>
  <rect x="370" y="158" width="174" height="30" fill="#45b7d1" rx="6" filter="url(#sh4)"/>
  <text x="457" y="178" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">18.5〜32.5万</text>
  <text x="370" y="202" font-size="10" fill="#45b7d1" font-weight="bold">184,800円</text>
  <!-- MacBook Pro M5 Pro bar: 369,800 ~ 594,800 -->
  <text x="30" y="255" font-size="13" font-weight="bold" fill="#343a40">Pro M5 Pro</text>
  <rect x="600" y="238" width="160" height="30" fill="#667eea" rx="6" filter="url(#sh4)"/>
  <text x="680" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">37.0〜59.5万</text>
  <text x="600" y="282" font-size="10" fill="#667eea" font-weight="bold">369,800円</text>
  <!-- MacBook Pro M5 Max bar: 599,800 ~ 1,099,800 -->
  <text x="30" y="315" font-size="13" font-weight="bold" fill="#343a40">Pro M5 Max</text>
  <rect x="700" y="298" width="60" height="30" fill="#764ba2" rx="6" filter="url(#sh4)"/>
  <text x="730" y="318" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">60万〜</text>
  <text x="700" y="282" font-size="10" fill="#764ba2" font-weight="bold">599,800円</text>
  <!-- Annotation -->
  <rect x="140" y="55" width="2" height="275" fill="#e9ecef"/>
  <text x="400" y="390" text-anchor="middle" font-size="10" fill="#868e96">※ 価格はCTOオプション含む。税込表示。2026年3月時点。</text>
</svg>