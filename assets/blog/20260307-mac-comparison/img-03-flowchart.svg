<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="800" height="700" fill="url(#bg3)" rx="12"/>
  <text x="400" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">あなたにぴったりのMacは？</text>
  <!-- Start -->
  <rect x="300" y="60" width="200" height="50" fill="#343a40" rx="25" filter="url(#sh)"/>
  <text x="400" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">Macで何をする？</text>
  <!-- Branch 1: Light use -->
  <line x1="330" y1="110" x2="160" y2="170" stroke="#adb5bd" stroke-width="2"/>
  <rect x="60" y="170" width="200" height="45" fill="#fff" stroke="#adb5bd" rx="8" filter="url(#sh)"/>
  <text x="160" y="192" text-anchor="middle" font-size="12" fill="#495057">Web閲覧・文書作成</text>
  <text x="160" y="207" text-anchor="middle" font-size="12" fill="#495057">動画視聴が中心</text>
  <!-- Branch 1 → Budget -->
  <line x1="160" y1="215" x2="160" y2="270" stroke="#adb5bd" stroke-width="2"/>
  <polygon points="160,275 155,265 165,265" fill="#adb5bd"/>
  <rect x="60" y="275" width="200" height="40" fill="#fff" stroke="#adb5bd" rx="22" filter="url(#sh)"/>
  <text x="160" y="300" text-anchor="middle" font-size="13" fill="#495057">予算は15万円以下？</text>
  <!-- Yes -->
  <line x1="110" y1="315" x2="110" y2="380" stroke="#4ecdc4" stroke-width="2"/>
  <text x="95" y="350" font-size="11" fill="#4ecdc4" font-weight="bold">Yes</text>
  <rect x="30" y="380" width="160" height="55" fill="#4ecdc4" rx="10" filter="url(#sh)"/>
  <text x="110" y="403" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">MacBook Neo</text>
  <text x="110" y="422" text-anchor="middle" font-size="11" fill="#fff">99,800円〜</text>
  <!-- No -->
  <line x1="210" y1="315" x2="210" y2="380" stroke="#45b7d1" stroke-width="2"/>
  <text x="218" y="350" font-size="11" fill="#45b7d1" font-weight="bold">No</text>
  <rect x="130" y="380" width="160" height="55" fill="#45b7d1" rx="10" filter="url(#sh)"/>
  <text x="210" y="403" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">MacBook Air M5</text>
  <text x="210" y="422" text-anchor="middle" font-size="11" fill="#fff">184,800円〜</text>
  <!-- Branch 2: Creative -->
  <line x1="400" y1="110" x2="400" y2="170" stroke="#adb5bd" stroke-width="2"/>
  <rect x="300" y="170" width="200" height="45" fill="#fff" stroke="#adb5bd" rx="8" filter="url(#sh)"/>
  <text x="400" y="192" text-anchor="middle" font-size="12" fill="#495057">写真・動画編集</text>
  <text x="400" y="207" text-anchor="middle" font-size="12" fill="#495057">プログラミング</text>
  <!-- Branch 2 → Budget -->
  <line x1="400" y1="215" x2="400" y2="270" stroke="#adb5bd" stroke-width="2"/>
  <polygon points="400,275 395,265 405,265" fill="#adb5bd"/>
  <rect x="300" y="275" width="200" height="40" fill="#fff" stroke="#adb5bd" rx="22" filter="url(#sh)"/>
  <text x="400" y="300" text-anchor="middle" font-size="13" fill="#495057">4K動画を編集する？</text>
  <!-- No → Air -->
  <line x1="350" y1="315" x2="310" y2="380" stroke="#45b7d1" stroke-width="2"/>
  <text x="310" y="350" font-size="11" fill="#45b7d1" font-weight="bold">No</text>
  <rect x="230" y="455" width="160" height="55" fill="#45b7d1" rx="10" filter="url(#sh)"/>
  <text x="310" y="478" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">MacBook Air M5</text>
  <text x="310" y="497" text-anchor="middle" font-size="11" fill="#fff">184,800円〜</text>
  <line x1="310" y1="380" x2="310" y2="455" stroke="#45b7d1" stroke-width="2" stroke-dasharray="4"/>
  <text x="318" y="420" font-size="10" fill="#868e96">コスパ重視</text>
  <!-- Yes → Pro -->
  <line x1="450" y1="315" x2="490" y2="380" stroke="#667eea" stroke-width="2"/>
  <text x="475" y="350" font-size="11" fill="#667eea" font-weight="bold">Yes</text>
  <rect x="410" y="380" width="160" height="55" fill="#667eea" rx="10" filter="url(#sh)"/>
  <text x="490" y="403" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">MacBook Pro</text>
  <text x="490" y="422" text-anchor="middle" font-size="11" fill="#fff">M5 Pro</text>
  <!-- Branch 3: Pro use -->
  <line x1="470" y1="110" x2="640" y2="170" stroke="#adb5bd" stroke-width="2"/>
  <rect x="540" y="170" width="200" height="45" fill="#fff" stroke="#adb5bd" rx="8" filter="url(#sh)"/>
  <text x="640" y="192" text-anchor="middle" font-size="12" fill="#495057">3D / ML / 8K映像</text>
  <text x="640" y="207" text-anchor="middle" font-size="12" fill="#495057">プロフェッショナル用途</text>
  <!-- Straight to Max -->
  <line x1="640" y1="215" x2="640" y2="310" stroke="#764ba2" stroke-width="2"/>
  <polygon points="640,315 635,305 645,305" fill="#764ba2"/>
  <rect x="560" y="315" width="160" height="55" fill="#764ba2" rx="10" filter="url(#sh)"/>
  <text x="640" y="338" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">MacBook Pro</text>
  <text x="640" y="357" text-anchor="middle" font-size="11" fill="#fff">M5 Max 599,800円〜</text>
  <!-- Summary boxes at bottom -->
  <rect x="50" y="530" width="700" height="130" fill="#fff" rx="10" opacity="0.7" filter="url(#sh)"/>
  <text x="400" y="558" text-anchor="middle" font-size="14" font-weight="bold" fill="#343a40">まとめ: 迷ったら...</text>
  <circle cx="130" cy="600" r="8" fill="#4ecdc4"/>
  <text x="148" y="605" font-size="12" fill="#495057"><tspan font-weight="bold">とにかく安く始めたい</tspan> → MacBook Neo</text>
  <circle cx="130" cy="630" r="8" fill="#45b7d1"/>
  <text x="148" y="635" font-size="12" fill="#495057"><tspan font-weight="bold">バランス重視・多くの人に最適</tspan> → MacBook Air M5</text>
  <circle cx="430" cy="600" r="8" fill="#667eea"/>
  <text x="448" y="605" font-size="12" fill="#495057"><tspan font-weight="bold">クリエイティブ作業</tspan> → MacBook Pro M5 Pro</text>
  <circle cx="430" cy="630" r="8" fill="#764ba2"/>
  <text x="448" y="635" font-size="12" fill="#495057"><tspan font-weight="bold">最高性能が必要</tspan> → MacBook Pro M5 Max</text>
</svg>