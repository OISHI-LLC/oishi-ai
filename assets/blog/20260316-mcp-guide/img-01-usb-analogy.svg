<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" fill="#f1f5f9" font-size="36" font-weight="bold">MCP以前 vs MCP以後</text>
  <text x="600" y="90" text-anchor="middle" fill="#94a3b8" font-size="22">AIとツールの接続方法がどう変わったか</text>

  <!-- Left: Before MCP -->
  <rect x="40" y="120" width="540" height="720" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="310" y="165" text-anchor="middle" fill="#ef4444" font-size="30" font-weight="bold">MCP以前</text>
  <text x="310" y="200" text-anchor="middle" fill="#94a3b8" font-size="20">ツールごとにバラバラの接続</text>

  <!-- AI Models (left) -->
  <rect x="70" y="240" width="180" height="50" rx="8" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-width="2"/>
  <text x="160" y="272" text-anchor="middle" fill="#c4b5fd" font-size="22" font-weight="bold">Claude</text>
  <rect x="70" y="310" width="180" height="50" rx="8" fill="#10a37f" fill-opacity="0.2" stroke="#10a37f" stroke-width="2"/>
  <text x="160" y="342" text-anchor="middle" fill="#6ee7b7" font-size="22" font-weight="bold">ChatGPT</text>
  <rect x="70" y="380" width="180" height="50" rx="8" fill="#4285f4" fill-opacity="0.2" stroke="#4285f4" stroke-width="2"/>
  <text x="160" y="412" text-anchor="middle" fill="#93c5fd" font-size="22" font-weight="bold">Gemini</text>

  <!-- Tools (left) -->
  <rect x="370" y="240" width="180" height="50" rx="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <text x="460" y="272" text-anchor="middle" fill="#e2e8f0" font-size="20">カレンダー</text>
  <rect x="370" y="310" width="180" height="50" rx="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <text x="460" y="342" text-anchor="middle" fill="#e2e8f0" font-size="20">Slack</text>
  <rect x="370" y="380" width="180" height="50" rx="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <text x="460" y="412" text-anchor="middle" fill="#e2e8f0" font-size="20">GitHub</text>
  <rect x="370" y="450" width="180" height="50" rx="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <text x="460" y="482" text-anchor="middle" fill="#e2e8f0" font-size="20">DB</text>

  <!-- Spaghetti lines (before) -->
  <line x1="250" y1="265" x2="370" y2="265" stroke="#ef4444" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="265" x2="370" y2="335" stroke="#ef4444" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="265" x2="370" y2="405" stroke="#ef4444" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="265" x2="370" y2="475" stroke="#ef4444" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="335" x2="370" y2="265" stroke="#f97316" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="335" x2="370" y2="335" stroke="#f97316" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="335" x2="370" y2="405" stroke="#f97316" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="335" x2="370" y2="475" stroke="#f97316" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="405" x2="370" y2="265" stroke="#eab308" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="405" x2="370" y2="335" stroke="#eab308" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="405" x2="370" y2="405" stroke="#eab308" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="250" y1="405" x2="370" y2="475" stroke="#eab308" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Count label (left) -->
  <rect x="130" y="540" width="300" height="70" rx="10" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <text x="280" y="570" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="bold">3 × 4 = 12通り</text>
  <text x="280" y="598" text-anchor="middle" fill="#fca5a5" font-size="20">個別開発が必要</text>

  <!-- Spaghetti metaphor -->
  <text x="310" y="670" text-anchor="middle" fill="#94a3b8" font-size="20">接続のたびに専用開発…</text>
  <text x="310" y="710" text-anchor="middle" fill="#64748b" font-size="20">コスト大 / 保守が大変 / 使い回し不可</text>
  <text x="310" y="780" text-anchor="middle" fill="#ef4444" font-size="24" font-weight="bold">✕ 非効率</text>

  <!-- Right: After MCP -->
  <rect x="620" y="120" width="540" height="720" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="890" y="165" text-anchor="middle" fill="#22c55e" font-size="30" font-weight="bold">MCP以後</text>
  <text x="890" y="200" text-anchor="middle" fill="#94a3b8" font-size="20">共通ルールで統一接続</text>

  <!-- AI Models (right) -->
  <rect x="650" y="260" width="160" height="50" rx="8" fill="#7c3aed" fill-opacity="0.2" stroke="#7c3aed" stroke-width="2"/>
  <text x="730" y="292" text-anchor="middle" fill="#c4b5fd" font-size="22" font-weight="bold">Claude</text>
  <rect x="650" y="330" width="160" height="50" rx="8" fill="#10a37f" fill-opacity="0.2" stroke="#10a37f" stroke-width="2"/>
  <text x="730" y="362" text-anchor="middle" fill="#6ee7b7" font-size="22" font-weight="bold">ChatGPT</text>
  <rect x="650" y="400" width="160" height="50" rx="8" fill="#4285f4" fill-opacity="0.2" stroke="#4285f4" stroke-width="2"/>
  <text x="730" y="432" text-anchor="middle" fill="#93c5fd" font-size="22" font-weight="bold">Gemini</text>

  <!-- MCP Hub -->
  <rect x="840" y="290" width="120" height="140" rx="16" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="3" filter="url(#glow)"/>
  <text x="900" y="350" text-anchor="middle" fill="#22c55e" font-size="30" font-weight="bold">MCP</text>
  <text x="900" y="380" text-anchor="middle" fill="#86efac" font-size="18">共通規格</text>

  <!-- Connections to MCP Hub -->
  <line x1="810" y1="285" x2="840" y2="330" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="810" y1="355" x2="840" y2="360" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="810" y1="425" x2="840" y2="390" stroke="#22c55e" stroke-width="2.5"/>

  <!-- Tools (right) -->
  <rect x="990" y="240" width="150" height="44" rx="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <text x="1065" y="268" text-anchor="middle" fill="#e2e8f0" font-size="20">カレンダー</text>
  <rect x="990" y="300" width="150" height="44" rx="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <text x="1065" y="328" text-anchor="middle" fill="#e2e8f0" font-size="20">Slack</text>
  <rect x="990" y="360" width="150" height="44" rx="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <text x="1065" y="388" text-anchor="middle" fill="#e2e8f0" font-size="20">GitHub</text>
  <rect x="990" y="420" width="150" height="44" rx="8" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <text x="1065" y="448" text-anchor="middle" fill="#e2e8f0" font-size="20">DB</text>

  <!-- Connections from MCP Hub to Tools -->
  <line x1="960" y1="330" x2="990" y2="262" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="960" y1="345" x2="990" y2="322" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="960" y1="365" x2="990" y2="382" stroke="#22c55e" stroke-width="2.5"/>
  <line x1="960" y1="380" x2="990" y2="442" stroke="#22c55e" stroke-width="2.5"/>

  <!-- Count label (right) -->
  <rect x="710" y="540" width="300" height="70" rx="10" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <text x="860" y="570" text-anchor="middle" fill="#22c55e" font-size="24" font-weight="bold">3 + 4 = 7通り</text>
  <text x="860" y="598" text-anchor="middle" fill="#86efac" font-size="20">MCPに1回対応するだけ</text>

  <!-- USB-C metaphor -->
  <text x="890" y="670" text-anchor="middle" fill="#94a3b8" font-size="20">USB-Cのように統一</text>
  <text x="890" y="710" text-anchor="middle" fill="#64748b" font-size="20">コスト削減 / 保守が楽 / 使い回し可</text>
  <text x="890" y="780" text-anchor="middle" fill="#22c55e" font-size="24" font-weight="bold">◎ 効率的</text>

  <!-- VS Arrow -->
  <text x="600" y="490" text-anchor="middle" fill="#64748b" font-size="40" font-weight="bold">→</text>
</svg>