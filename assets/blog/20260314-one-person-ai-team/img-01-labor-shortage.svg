<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF2F2"/>
      <stop offset="100%" stop-color="#FEE2E2"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="barGray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="100%" stop-color="#6B7280"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" fill="url(#bg1)"/>

  <!-- Title -->
  <text x="600" y="65" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="bold" fill="#0F172A">人手不足倒産の現実</text>
  <text x="600" y="110" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#DC2626">2024年は過去最多の427件（前年比32.2%増）</text>

  <!-- Y axis label -->
  <text x="80" y="190" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#6B7280">件数</text>

  <!-- Bars: 2019-2024 -->
  <!-- 2019: 185 -->
  <rect x="140" y="480" width="120" height="185" rx="6" fill="url(#barGray)"/>
  <text x="200" y="468" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#6B7280">185</text>
  <text x="200" y="705" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#374151">2019</text>

  <!-- 2020: 163 -->
  <rect x="290" y="502" width="120" height="163" rx="6" fill="url(#barGray)"/>
  <text x="350" y="490" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#6B7280">163</text>
  <text x="350" y="705" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#374151">2020</text>

  <!-- 2021: 160 -->
  <rect x="440" y="505" width="120" height="160" rx="6" fill="url(#barGray)"/>
  <text x="500" y="493" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#6B7280">160</text>
  <text x="500" y="705" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#374151">2021</text>

  <!-- 2022: 249 -->
  <rect x="590" y="416" width="120" height="249" rx="6" fill="url(#barGray)"/>
  <text x="650" y="404" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#6B7280">249</text>
  <text x="650" y="705" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#374151">2022</text>

  <!-- 2023: 313 -->
  <rect x="740" y="352" width="120" height="313" rx="6" fill="url(#barGray)"/>
  <text x="800" y="340" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#6B7280">313</text>
  <text x="800" y="705" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#374151">2023</text>

  <!-- 2024: 427 (highlight) -->
  <rect x="890" y="238" width="120" height="427" rx="6" fill="url(#barRed)"/>
  <text x="950" y="223" text-anchor="middle" font-family="sans-serif" font-size="38" font-weight="bold" fill="#DC2626">427</text>
  <text x="950" y="705" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#DC2626">2024</text>

  <!-- Baseline -->
  <line x1="120" y1="665" x2="1030" y2="665" stroke="#94A3B8" stroke-width="2"/>

  <!-- Key stat boxes -->
  <rect x="100" y="735" width="480" height="50" rx="10" fill="#FEE2E2"/>
  <text x="340" y="768" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#991B1B">倒産企業の77%が従業員10人未満</text>

  <rect x="620" y="735" width="480" height="50" rx="10" fill="#FEE2E2"/>
  <text x="860" y="768" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#991B1B">求人難型が過半数を占める</text>

  <!-- Source (bottom) -->
  <text x="600" y="810" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#9CA3AF">出典：帝国データバンク「人手不足倒産の動向調査（2024年）」</text>
</svg>