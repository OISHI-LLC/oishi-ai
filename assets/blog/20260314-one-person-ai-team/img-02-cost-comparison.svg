<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="redBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FEE2E2"/>
      <stop offset="100%" stop-color="#FECACA"/>
    </linearGradient>
    <linearGradient id="greenBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCFCE7"/>
      <stop offset="100%" stop-color="#BBF7D0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-family="sans-serif" font-size="44" font-weight="bold" fill="#0F172A">雇用 vs AIツール：年間コスト比較</text>
  <text x="600" y="95" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#3B82F6">正社員1人分のコストでAIツールが何年使えるか</text>

  <!-- Left: Employment cost -->
  <rect x="50" y="130" width="530" height="650" rx="20" fill="#fff" stroke="#EF4444" stroke-width="3"/>
  <rect x="50" y="130" width="530" height="65" rx="20" fill="#EF4444"/>
  <rect x="50" y="175" width="530" height="20" fill="#EF4444"/>
  <text x="315" y="175" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="#fff">正社員1人を雇用する場合</text>

  <text x="315" y="240" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#991B1B" font-weight="bold">年間コスト：約1,125〜1,425万円</text>

  <!-- Row: 基本給与 -->
  <rect x="90" y="265" width="450" height="70" rx="8" fill="url(#redBox)"/>
  <text x="110" y="295" font-family="sans-serif" font-size="26" fill="#374151">基本給与</text>
  <text x="520" y="295" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#991B1B">500〜700万円</text>
  <text x="520" y="325" text-anchor="end" font-family="sans-serif" font-size="22" fill="#6B7280">（月給＋賞与）</text>

  <!-- Row: 社会保険料 -->
  <rect x="90" y="350" width="450" height="70" rx="8" fill="url(#redBox)"/>
  <text x="110" y="380" font-family="sans-serif" font-size="26" fill="#374151">社会保険料</text>
  <text x="520" y="380" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#991B1B">75〜105万円</text>
  <text x="520" y="410" text-anchor="end" font-family="sans-serif" font-size="22" fill="#6B7280">（会社負担分 約15%）</text>

  <!-- Row: 採用コスト -->
  <rect x="90" y="435" width="450" height="70" rx="8" fill="url(#redBox)"/>
  <text x="110" y="465" font-family="sans-serif" font-size="26" fill="#374151">採用コスト</text>
  <text x="520" y="465" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#991B1B">100〜150万円</text>
  <text x="520" y="495" text-anchor="end" font-family="sans-serif" font-size="22" fill="#6B7280">（求人広告・エージェント）</text>

  <!-- Row: 教育・研修費 -->
  <rect x="90" y="520" width="450" height="55" rx="8" fill="url(#redBox)"/>
  <text x="110" y="555" font-family="sans-serif" font-size="26" fill="#374151">教育・研修費</text>
  <text x="520" y="555" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#991B1B">50〜70万円</text>

  <!-- Row: 備品・福利厚生 -->
  <rect x="90" y="590" width="450" height="55" rx="8" fill="url(#redBox)"/>
  <text x="110" y="625" font-family="sans-serif" font-size="26" fill="#374151">備品・福利厚生</text>
  <text x="520" y="625" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#991B1B">100万円〜</text>

  <!-- Row: 退職リスク -->
  <rect x="90" y="660" width="450" height="55" rx="8" fill="url(#redBox)"/>
  <text x="110" y="695" font-family="sans-serif" font-size="26" fill="#374151">退職リスク</text>
  <text x="520" y="695" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#991B1B">300万円〜</text>

  <!-- Right: AI tools cost -->
  <rect x="620" y="130" width="530" height="650" rx="20" fill="#fff" stroke="#22C55E" stroke-width="3"/>
  <rect x="620" y="130" width="530" height="65" rx="20" fill="#22C55E"/>
  <rect x="620" y="175" width="530" height="20" fill="#22C55E"/>
  <text x="885" y="175" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="#fff">AIツールを活用する場合</text>

  <text x="885" y="240" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#166534" font-weight="bold">年間コスト：約5〜18万円</text>

  <rect x="660" y="265" width="450" height="55" rx="8" fill="url(#greenBox)"/>
  <text x="680" y="300" font-family="sans-serif" font-size="26" fill="#374151">Claude Pro</text>
  <text x="1090" y="300" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#166534">約3.6万円/年</text>

  <rect x="660" y="335" width="450" height="55" rx="8" fill="url(#greenBox)"/>
  <text x="680" y="370" font-family="sans-serif" font-size="26" fill="#374151">ChatGPT Plus</text>
  <text x="1090" y="370" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#166534">約3.6万円/年</text>

  <rect x="660" y="405" width="450" height="55" rx="8" fill="url(#greenBox)"/>
  <text x="680" y="440" font-family="sans-serif" font-size="26" fill="#374151">Canva Pro</text>
  <text x="1090" y="440" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#166534">約1.2万円/年</text>

  <rect x="660" y="475" width="450" height="55" rx="8" fill="url(#greenBox)"/>
  <text x="680" y="510" font-family="sans-serif" font-size="26" fill="#374151">Zapier Starter</text>
  <text x="1090" y="510" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#166534">約3.6万円/年</text>

  <rect x="660" y="545" width="450" height="55" rx="8" fill="url(#greenBox)"/>
  <text x="680" y="580" font-family="sans-serif" font-size="26" fill="#374151">フル活用合計</text>
  <text x="1090" y="580" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#166534">約12万円/年</text>

  <rect x="660" y="615" width="450" height="55" rx="8" fill="url(#greenBox)"/>
  <text x="680" y="650" font-family="sans-serif" font-size="26" fill="#374151">最小構成</text>
  <text x="1090" y="650" text-anchor="end" font-family="sans-serif" font-size="26" font-weight="bold" fill="#166534">約3.6万円/年</text>

  <rect x="660" y="700" width="450" height="55" rx="10" fill="#D1FAE5"/>
  <text x="885" y="735" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="bold" fill="#065F46">24時間稼働・退職リスクなし</text>

  <!-- Bottom comparison -->
  <rect x="150" y="815" width="900" height="65" rx="15" fill="#1E40AF"/>
  <text x="600" y="857" text-anchor="middle" font-family="sans-serif" font-size="32" font-weight="bold" fill="#fff">差額：約1,100万円以上 = AIなら約90年分</text>
</svg>