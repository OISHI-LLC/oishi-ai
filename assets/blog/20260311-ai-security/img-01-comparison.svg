<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="520" rx="24" fill="url(#bg1)"/>
  <text x="800" y="55" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="#1E1B4B">従来のセキュリティ監査 vs AI活用監査</text>

  <!-- Left: Traditional -->
  <rect x="60" y="85" width="700" height="400" rx="16" fill="#fff"/>
  <rect x="60" y="85" width="700" height="50" rx="16" fill="#94A3B8" opacity="0.15"/>
  <text x="410" y="118" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#64748B">従来のセキュリティ監査</text>

  <!-- Shield icon (simple path) -->
  <path d="M410 165 L440 155 L440 185 Q440 210 410 225 Q380 210 380 185 L380 155 Z" fill="none" stroke="#94A3B8" stroke-width="2.5"/>
  <line x1="410" y1="175" x2="410" y2="205" stroke="#94A3B8" stroke-width="2"/>
  <line x1="395" y1="190" x2="425" y2="190" stroke="#94A3B8" stroke-width="2"/>

  <rect x="120" y="245" width="580" height="48" rx="10" fill="#F1F5F9"/>
  <text x="180" y="276" font-family="sans-serif" font-size="18" fill="#64748B" font-weight="600">費用</text>
  <text x="500" y="276" font-family="sans-serif" font-size="18" fill="#64748B">数百万〜数千万円</text>

  <rect x="120" y="305" width="580" height="48" rx="10" fill="#fff"/>
  <text x="180" y="336" font-family="sans-serif" font-size="18" fill="#64748B" font-weight="600">期間</text>
  <text x="500" y="336" font-family="sans-serif" font-size="18" fill="#64748B">数週間〜数ヶ月</text>

  <rect x="120" y="365" width="580" height="48" rx="10" fill="#F1F5F9"/>
  <text x="180" y="396" font-family="sans-serif" font-size="18" fill="#64748B" font-weight="600">対象</text>
  <text x="500" y="396" font-family="sans-serif" font-size="18" fill="#64748B">依頼した範囲のみ</text>

  <rect x="120" y="425" width="580" height="48" rx="10" fill="#fff"/>
  <text x="180" y="456" font-family="sans-serif" font-size="18" fill="#64748B" font-weight="600">頻度</text>
  <text x="500" y="456" font-family="sans-serif" font-size="18" fill="#64748B">年1〜2回が一般的</text>

  <!-- Arrow between -->
  <path d="M790 285 L830 285" stroke="#7C3AED" stroke-width="3"/>
  <polygon points="830,275 860,285 830,295" fill="#7C3AED"/>

  <!-- Right: AI -->
  <rect x="840" y="85" width="700" height="400" rx="16" fill="#fff"/>
  <rect x="840" y="85" width="700" height="50" rx="16" fill="#7C3AED" opacity="0.15"/>
  <text x="1190" y="118" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#7C3AED">AI活用セキュリティ監査</text>

  <!-- AI Shield icon -->
  <path d="M1190 165 L1220 155 L1220 185 Q1220 210 1190 225 Q1160 210 1160 185 L1160 155 Z" fill="#7C3AED" opacity="0.15" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="1190" y="198" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7C3AED">AI</text>

  <rect x="900" y="245" width="580" height="48" rx="10" fill="#F5F3FF"/>
  <text x="960" y="276" font-family="sans-serif" font-size="18" fill="#7C3AED" font-weight="600">費用</text>
  <text x="1280" y="276" font-family="sans-serif" font-size="18" font-weight="bold" fill="#7C3AED">約60万円</text>

  <rect x="900" y="305" width="580" height="48" rx="10" fill="#fff"/>
  <text x="960" y="336" font-family="sans-serif" font-size="18" fill="#7C3AED" font-weight="600">期間</text>
  <text x="1280" y="336" font-family="sans-serif" font-size="18" font-weight="bold" fill="#7C3AED">2週間</text>

  <rect x="900" y="365" width="580" height="48" rx="10" fill="#F5F3FF"/>
  <text x="960" y="396" font-family="sans-serif" font-size="18" fill="#7C3AED" font-weight="600">対象</text>
  <text x="1280" y="396" font-family="sans-serif" font-size="18" font-weight="bold" fill="#7C3AED">6,000ファイルを網羅的に</text>

  <rect x="900" y="425" width="580" height="48" rx="10" fill="#fff"/>
  <text x="960" y="456" font-family="sans-serif" font-size="18" fill="#7C3AED" font-weight="600">頻度</text>
  <text x="1280" y="456" font-family="sans-serif" font-size="18" font-weight="bold" fill="#7C3AED">いつでも実行可能</text>
</svg>