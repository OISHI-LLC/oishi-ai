<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#DCFCE7"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="480" rx="24" fill="url(#bg4)"/>
  <text x="800" y="55" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="#1E1B4B">今すぐできるセキュリティ対策 3ステップ</text>

  <!-- Step 1 -->
  <rect x="60" y="90" width="470" height="360" rx="16" fill="#fff"/>
  <circle cx="160" cy="130" r="28" fill="#16A34A" opacity="0.15"/>
  <text x="160" y="139" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#16A34A">1</text>
  <text x="210" y="137" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1E1B4B">ソフトウェアを最新に</text>

  <!-- Update icon -->
  <path d="M295 195 A25 25 0 1 1 270 185" fill="none" stroke="#16A34A" stroke-width="3" stroke-linecap="round"/>
  <polygon points="270,176 270,194 280,185" fill="#16A34A"/>

  <text x="295" y="250" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6B7280">ブラウザ・OS・ソフトの更新</text>
  <text x="295" y="278" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6B7280">自動更新を有効にする</text>

  <rect x="120" y="305" width="350" height="50" rx="10" fill="#F0FDF4"/>
  <text x="295" y="336" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#16A34A">費用：0円</text>

  <text x="295" y="390" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">攻撃の大半は「既知の脆弱性」を悪用。</text>
  <text x="295" y="412" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">更新するだけで防げる攻撃が多数。</text>

  <!-- Arrow 1->2 -->
  <path d="M545 270 L565 270" stroke="#16A34A" stroke-width="2"/>
  <polygon points="565,264 575,270 565,276" fill="#16A34A"/>

  <!-- Step 2 -->
  <rect x="565" y="90" width="470" height="360" rx="16" fill="#fff"/>
  <circle cx="665" cy="130" r="28" fill="#16A34A" opacity="0.15"/>
  <text x="665" y="139" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#16A34A">2</text>
  <text x="715" y="137" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1E1B4B">クラウド型ツール導入</text>

  <!-- Cloud icon -->
  <path d="M775 190 Q775 170 795 170 Q800 160 815 160 Q835 160 835 180 Q850 180 850 195 Q850 210 835 210 L780 210 Q765 210 765 195 Q765 185 775 190 Z" fill="none" stroke="#16A34A" stroke-width="3"/>

  <text x="800" y="250" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6B7280">Microsoft Defender for Business</text>
  <text x="800" y="278" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6B7280">Google Workspace / Cloudflare</text>

  <rect x="625" y="305" width="350" height="50" rx="10" fill="#F0FDF4"/>
  <text x="800" y="336" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#16A34A">月額 数千円〜</text>

  <text x="800" y="390" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">AIによる監視・検知・対応が</text>
  <text x="800" y="412" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">低コストで利用可能に。</text>

  <!-- Arrow 2->3 -->
  <path d="M1050 270 L1070 270" stroke="#16A34A" stroke-width="2"/>
  <polygon points="1070,264 1080,270 1070,276" fill="#16A34A"/>

  <!-- Step 3 -->
  <rect x="1070" y="90" width="470" height="360" rx="16" fill="#fff"/>
  <circle cx="1170" cy="130" r="28" fill="#16A34A" opacity="0.15"/>
  <text x="1170" y="139" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#16A34A">3</text>
  <text x="1220" y="137" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1E1B4B">社員の意識を高める</text>

  <!-- People icon -->
  <circle cx="1295" cy="175" r="10" fill="none" stroke="#16A34A" stroke-width="3"/>
  <path d="M1275 210 Q1275 195 1295 195 Q1315 195 1315 210" fill="none" stroke="#16A34A" stroke-width="3"/>
  <circle cx="1320" cy="175" r="10" fill="none" stroke="#16A34A" stroke-width="2" opacity="0.5"/>
  <path d="M1300 210 Q1300 195 1320 195 Q1340 195 1340 210" fill="none" stroke="#16A34A" stroke-width="2" opacity="0.5"/>

  <text x="1305" y="250" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6B7280">不審メールのルール明文化</text>
  <text x="1305" y="278" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6B7280">送金依頼は電話で本人確認</text>

  <rect x="1130" y="305" width="350" height="50" rx="10" fill="#F0FDF4"/>
  <text x="1305" y="336" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#16A34A">費用：0円〜</text>

  <text x="1305" y="390" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">AIでフィッシングメールのサンプルを</text>
  <text x="1305" y="412" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">作り、社員の「見分ける練習」に。</text>
</svg>