<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820">
  <defs>
    <linearGradient id="bg1c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="820" rx="24" fill="url(#bg1c)"/>
  <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="52" font-weight="bold" fill="#1E1B4B">普通のAIチャット と Cowork の違い</text>

  <!-- Left: Normal AI -->
  <rect x="40" y="120" width="550" height="670" rx="20" fill="#fff" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="40" y="120" width="550" height="70" rx="20" fill="#F1F5F9"/>
  <rect x="40" y="170" width="550" height="20" fill="#F1F5F9"/>
  <text x="315" y="168" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#64748B">普通のAIチャット</text>

  <text x="315" y="290" text-anchor="middle" font-family="sans-serif" font-size="72">💬</text>
  <text x="315" y="355" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#1E1B4B">「こうするといいよ」</text>
  <text x="315" y="405" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">アドバイスはくれるけど</text>
  <text x="315" y="445" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">実際の作業は自分でやる</text>

  <rect x="80" y="480" width="470" height="100" rx="14" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="315" y="520" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#DC2626">「Excelにまとめるといいですよ」</text>
  <text x="315" y="558" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#DC2626">→ 実際に作るのは自分……</text>

  <rect x="80" y="610" width="470" height="130" rx="14" fill="#FEE2E2"/>
  <text x="315" y="660" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#991B1B">相談役 🗣️</text>
  <text x="315" y="710" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#991B1B">教えてくれるけど、手は動かさない</text>

  <!-- Right: Cowork -->
  <rect x="610" y="120" width="550" height="670" rx="20" fill="#fff" stroke="#16A34A" stroke-width="3"/>
  <rect x="610" y="120" width="550" height="70" rx="20" fill="#F0FDF4"/>
  <rect x="610" y="170" width="550" height="20" fill="#F0FDF4"/>
  <text x="885" y="168" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#16A34A">Claude Cowork</text>

  <text x="885" y="290" text-anchor="middle" font-family="sans-serif" font-size="72">🤝</text>
  <text x="885" y="355" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#1E1B4B">「やっておくね」</text>
  <text x="885" y="405" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">AIがファイルに直接アクセスして</text>
  <text x="885" y="445" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">実際に作業を完了してくれる</text>

  <rect x="650" y="480" width="470" height="100" rx="14" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <text x="885" y="520" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#16A34A">「Excelにまとめておきました」</text>
  <text x="885" y="558" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#16A34A">→ 完成ファイルがフォルダに！</text>

  <rect x="650" y="610" width="470" height="130" rx="14" fill="#DCFCE7"/>
  <text x="885" y="660" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#166534">同僚 🤝</text>
  <text x="885" y="710" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#166534">一緒に手を動かしてくれるパートナー</text>
</svg>
