  <text x="320" y="935" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#92400E">4月以降対応予定</text>

  <!-- Outlook / Teams -->
  <rect x="620" y="650" width="540" height="350" rx="20" fill="#fff"/>
  <text x="890" y="730" text-anchor="middle" font-family="sans-serif" font-size="72">📨</text>
  <text x="890" y="790" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#7C3AED">Outlook / Teams</text>
  <text x="890" y="835" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">会議準備・メール下書き</text>
  <text x="890" y="870" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">スケジュール調整</text>
  <rect x="680" y="900" width="420" height="55" rx="10" fill="#FEF3C7"/>
  <text x="890" y="935" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#92400E">順次対応予定</text>
