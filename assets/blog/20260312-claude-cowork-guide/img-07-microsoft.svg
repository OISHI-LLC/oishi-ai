<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1050">
  <defs>
    <linearGradient id="bg7c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1050" rx="24" fill="url(#bg7c)"/>
  <text x="600" y="65" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="#1E1B4B">Microsoft 365 × Claude Cowork</text>
  <text x="600" y="110" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#1D4ED8">2026年3月 MicrosoftとAnthropicが提携を発表</text>

  <!-- Header: Copilot Cowork -->
  <rect x="250" y="140" width="700" height="100" rx="20" fill="#fff" stroke="#1D4ED8" stroke-width="3"/>
  <text x="600" y="185" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1D4ED8">Copilot Cowork</text>
  <text x="600" y="220" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#6B7280">Microsoft 365にClaude技術を統合</text>

  <!-- Row 1 -->
  <!-- Excel -->
  <rect x="40" y="280" width="560" height="330" rx="20" fill="#fff"/>
  <text x="320" y="360" text-anchor="middle" font-family="sans-serif" font-size="72">📗</text>
  <text x="320" y="420" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#16A34A">Excel</text>
  <text x="320" y="465" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">データ分析・関数入力</text>
  <text x="320" y="500" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">グラフ作成</text>
  <rect x="100" y="530" width="440" height="55" rx="10" fill="#DCFCE7"/>
  <text x="320" y="565" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#16A34A">3/11 アドイン提供開始</text>

  <!-- PowerPoint -->
  <rect x="620" y="280" width="540" height="330" rx="20" fill="#fff"/>
  <text x="890" y="360" text-anchor="middle" font-family="sans-serif" font-size="72">📙</text>
  <text x="890" y="420" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#EA580C">PowerPoint</text>
  <text x="890" y="465" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">プレゼン資料の自動作成</text>
  <text x="890" y="500" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">デザイン調整</text>
  <rect x="680" y="530" width="420" height="55" rx="10" fill="#DCFCE7"/>
  <text x="890" y="565" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#16A34A">3/11 アドイン提供開始</text>

  <!-- Row 2 -->
  <!-- Word -->
  <rect x="40" y="650" width="560" height="350" rx="20" fill="#fff"/>
  <text x="320" y="730" text-anchor="middle" font-family="sans-serif" font-size="72">📘</text>
  <text x="320" y="790" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#2563EB">Word</text>
  <text x="320" y="835" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">文書の下書き・編集</text>
  <text x="320" y="870" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">フォーマット調整</text>
