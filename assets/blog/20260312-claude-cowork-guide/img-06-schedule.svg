<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1060">
  <defs>
    <linearGradient id="bg6c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1060" rx="24" fill="url(#bg6c)"/>
  <text x="600" y="68" text-anchor="middle" font-family="sans-serif" font-size="52" font-weight="bold" fill="#1E1B4B">スケジュール機能</text>
  <text x="600" y="115" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#0369A1">一度設定すれば、あとは自動でやってくれる</text>

  <!-- Row 1 -->
  <!-- Daily -->
  <rect x="40" y="155" width="560" height="390" rx="20" fill="#fff"/>
  <text x="320" y="240" text-anchor="middle" font-family="sans-serif" font-size="72">☀️</text>
  <text x="320" y="300" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1E1B4B">毎日（日次）</text>
  <rect x="80" y="325" width="480" height="65" rx="12" fill="#F0F9FF"/>
  <text x="320" y="355" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">「毎朝、昨日のニュースを</text>
  <text x="320" y="383" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">まとめてデスクトップに」</text>
  <rect x="80" y="405" width="480" height="55" rx="12" fill="#F0F9FF"/>
  <text x="320" y="440" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">「毎日18時に日報テンプレを作成」</text>
  <rect x="120" y="478" width="400" height="50" rx="10" fill="#DCFCE7"/>
  <text x="320" y="510" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#16A34A">朝の準備が楽に</text>

  <!-- Weekly -->
  <rect x="620" y="155" width="540" height="390" rx="20" fill="#fff"/>
  <text x="890" y="240" text-anchor="middle" font-family="sans-serif" font-size="72">📅</text>
  <text x="890" y="300" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1E1B4B">毎週（週次）</text>
  <rect x="660" y="325" width="460" height="65" rx="12" fill="#F0F9FF"/>
  <text x="890" y="355" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">「毎週金曜に、今週の</text>
  <text x="890" y="383" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">作業フォルダを整理」</text>
  <rect x="660" y="405" width="460" height="55" rx="12" fill="#F0F9FF"/>
  <text x="890" y="440" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">「毎週月曜に週次レポートを作成」</text>
  <rect x="700" y="478" width="380" height="50" rx="10" fill="#DCFCE7"/>
  <text x="890" y="510" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#16A34A">ルーティン自動化</text>

  <!-- Row 2 -->
  <!-- Monthly -->
  <rect x="40" y="575" width="560" height="440" rx="20" fill="#fff"/>
  <text x="320" y="660" text-anchor="middle" font-family="sans-serif" font-size="72">📆</text>
  <text x="320" y="720" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1E1B4B">毎月（月次）</text>
  <rect x="80" y="745" width="480" height="65" rx="12" fill="#F0F9FF"/>
  <text x="320" y="775" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">「月末に先月の売上を</text>
  <text x="320" y="803" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">Excelにまとめて」</text>
  <rect x="80" y="825" width="480" height="65" rx="12" fill="#F0F9FF"/>
  <text x="320" y="855" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">「月初に先月の</text>
  <text x="320" y="883" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">活動報告書を自動生成」</text>
  <rect x="120" y="908" width="400" height="50" rx="10" fill="#DCFCE7"/>
  <text x="320" y="940" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#16A34A">月末の忙しさ軽減</text>

  <!-- Custom -->
  <rect x="620" y="575" width="540" height="440" rx="20" fill="#fff" stroke="#0369A1" stroke-width="3"/>
  <text x="890" y="660" text-anchor="middle" font-family="sans-serif" font-size="72">⚙️</text>
  <text x="890" y="720" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1E1B4B">カスタム</text>
  <rect x="660" y="745" width="460" height="65" rx="12" fill="#F0F9FF"/>
  <text x="890" y="775" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">好きな間隔で</text>
  <text x="890" y="803" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">自由に設定可能</text>
  <rect x="660" y="825" width="460" height="95" rx="12" fill="#EFF6FF"/>
  <text x="890" y="860" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">プラグインやコネクタも</text>
  <text x="890" y="893" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#0369A1">併用してワークフローを構築</text>
  <rect x="720" y="938" width="340" height="50" rx="10" fill="#DBEAFE"/>
  <text x="890" y="970" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#1D4ED8">上級者向け</text>
</svg>
