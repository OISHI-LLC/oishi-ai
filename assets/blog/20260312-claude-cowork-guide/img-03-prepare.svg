<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="bg3c" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFEDD5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" rx="24" fill="url(#bg3c)"/>
  <text x="600" y="68" text-anchor="middle" font-family="sans-serif" font-size="52" font-weight="bold" fill="#1E1B4B">始める前に用意するもの</text>
  <text x="600" y="115" text-anchor="middle" font-family="sans-serif" font-size="32" fill="#C2410C">必要なのは たった3つ だけ</text>

  <!-- Item 1: PC -->
  <rect x="40" y="155" width="360" height="510" rx="20" fill="#fff"/>
  <text x="220" y="250" text-anchor="middle" font-family="sans-serif" font-size="72">💻</text>
  <text x="220" y="310" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1E1B4B">パソコン</text>
  <text x="220" y="360" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">Mac または Windows</text>
  <text x="220" y="400" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">デスクトップアプリが必要</text>
  <rect x="75" y="435" width="290" height="100" rx="14" fill="#FFF7ED"/>
  <text x="220" y="475" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#C2410C">スマホ・タブレットは</text>
  <text x="220" y="510" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#C2410C">現在非対応</text>
  <text x="220" y="575" text-anchor="middle" font-family="sans-serif" font-size="26" fill="#9A3412">（Web版も非対応）</text>

  <!-- Item 2: Internet -->
  <rect x="420" y="155" width="360" height="510" rx="20" fill="#fff"/>
  <text x="600" y="250" text-anchor="middle" font-family="sans-serif" font-size="72">🌐</text>
  <text x="600" y="310" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1E1B4B">インターネット</text>
  <text x="600" y="360" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">Wi-Fiでもモバイルでも</text>
  <text x="600" y="400" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">つながっていればOK</text>
  <rect x="455" y="435" width="290" height="100" rx="14" fill="#FFF7ED"/>
  <text x="600" y="475" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#C2410C">常時接続が必要</text>
  <text x="600" y="510" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#C2410C">オフラインでは使えません</text>

  <!-- Item 3: Account -->
  <rect x="800" y="155" width="360" height="510" rx="20" fill="#fff" stroke="#F97316" stroke-width="3"/>
  <text x="980" y="250" text-anchor="middle" font-family="sans-serif" font-size="72">🔑</text>
  <text x="980" y="310" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#1E1B4B">有料アカウント</text>
  <text x="980" y="360" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">Pro（$20/月）が最も手軽</text>
  <text x="980" y="400" text-anchor="middle" font-family="sans-serif" font-size="30" fill="#6B7280">無料プランでは使えません</text>
  <rect x="835" y="435" width="290" height="100" rx="14" fill="#DCFCE7"/>
  <text x="980" y="475" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#16A34A">おすすめ：Claude Pro</text>
  <text x="980" y="510" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#166534">月額約3,000円で始められる</text>
</svg>
