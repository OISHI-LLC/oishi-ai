<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="500" rx="24" fill="url(#bg1)"/>
  <text x="800" y="60" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#1E1B4B">AI導入率 vs 成果率：82ポイントのギャップ</text>
  <!-- 88% bar -->
  <rect x="200" y="110" width="500" height="160" rx="16" fill="#7C3AED" opacity="0.9"/>
  <text x="450" y="175" text-anchor="middle" font-family="sans-serif" font-size="64" font-weight="bold" fill="#fff">88%</text>
  <text x="450" y="230" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#E9D5FF">AIを業務に導入している企業</text>
  <!-- Arrow -->
  <path d="M740 190 L830 190" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8,6"/>
  <polygon points="830,180 855,190 830,200" fill="#94A3B8"/>
  <!-- 6% bar -->
  <rect x="900" y="110" width="500" height="160" rx="16" fill="#fff" stroke="#7C3AED" stroke-width="2"/>
  <rect x="900" y="110" width="34" height="160" rx="16" fill="#7C3AED" opacity="0.3"/>
  <text x="1150" y="175" text-anchor="middle" font-family="sans-serif" font-size="64" font-weight="bold" fill="#7C3AED">6%</text>
  <text x="1150" y="230" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#6B7280">利益（EBIT）に貢献している企業</text>
  <!-- Bottom labels -->
  <rect x="200" y="320" width="340" height="120" rx="12" fill="#fff" opacity="0.8"/>
  <text x="370" y="365" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#6B7280">生成AI利用率</text>
  <text x="370" y="405" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#7C3AED">72%</text>
  <text x="370" y="425" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9CA3AF">前年33%から倍増</text>
  <rect x="630" y="320" width="340" height="120" rx="12" fill="#fff" opacity="0.8"/>
  <text x="800" y="365" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#6B7280">全社スケーリング済み</text>
  <text x="800" y="405" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#7C3AED">33%</text>
  <text x="800" y="425" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9CA3AF">3社に1社のみ</text>
  <rect x="1060" y="320" width="340" height="120" rx="12" fill="#fff" opacity="0.8"/>
  <text x="1230" y="365" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#6B7280">AIエージェント実験中</text>
  <text x="1230" y="405" text-anchor="middle" font-family="sans-serif" font-size="40" font-weight="bold" fill="#7C3AED">62%</text>
  <text x="1230" y="425" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9CA3AF">23%が本格導入</text>
  <text x="800" y="485" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#9CA3AF">出典：McKinsey "The State of AI in 2025"</text>
</svg>
