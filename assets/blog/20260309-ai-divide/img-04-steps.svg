<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 440">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="440" rx="24" fill="url(#bg4)"/>
  <text x="800" y="55" text-anchor="middle" font-family="sans-serif" font-size="34" font-weight="bold" fill="#1E1B4B">中小企業のAI活用 3ステップ</text>
  <!-- Step 1 -->
  <rect x="60" y="90" width="470" height="300" rx="16" fill="#fff" opacity="0.9"/>
  <circle cx="295" cy="140" r="28" fill="#7C3AED"/>
  <text x="295" y="149" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#fff">1</text>
  <text x="295" y="195" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1E1B4B">1つの業務を再設計</text>
  <text x="295" y="235" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#6B7280">効果が見えやすい業務を選ぶ</text>
  <text x="295" y="262" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#6B7280">サポート / レポート / メール</text>
  <text x="295" y="289" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#6B7280">AIが主体の新フローを設計</text>
  <rect x="170" y="320" width="250" height="36" rx="18" fill="#7C3AED" opacity="0.1"/>
  <text x="295" y="344" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7C3AED">期間: 1〜2週間</text>
  <!-- Arrow 1->2 -->
  <path d="M545 240 L555 240" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="555,230 580,240 555,250" fill="#CBD5E1"/>
  <!-- Step 2 -->
  <rect x="565" y="90" width="470" height="300" rx="16" fill="#fff" opacity="0.9"/>
  <circle cx="800" cy="140" r="28" fill="#7C3AED" opacity="0.8"/>
  <text x="800" y="149" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#fff">2</text>
  <text x="800" y="195" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1E1B4B">効果を数字で測定</text>
  <text x="800" y="235" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#6B7280">所要時間 / 処理件数 / ミス率</text>
  <text x="800" y="262" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#6B7280">導入前後を数字で比較</text>
  <text x="800" y="289" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#6B7280">社内説得の根拠を作る</text>
  <rect x="675" y="320" width="250" height="36" rx="18" fill="#7C3AED" opacity="0.1"/>
  <text x="800" y="344" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7C3AED">期間: 2〜4週間</text>
  <!-- Arrow 2->3 -->
  <path d="M1050 240 L1060 240" stroke="#CBD5E1" stroke-width="2"/>
  <polygon points="1060,230 1085,240 1060,250" fill="#CBD5E1"/>
  <!-- Step 3 -->
  <rect x="1070" y="90" width="470" height="300" rx="16" fill="#fff" opacity="0.9"/>
  <circle cx="1305" cy="140" r="28" fill="#7C3AED" opacity="0.6"/>
  <text x="1305" y="149" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#fff">3</text>
  <text x="1305" y="195" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1E1B4B">成功事例を横展開</text>
  <text x="1305" y="235" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#6B7280">他の業務にも同じ手法を適用</text>
  <text x="1305" y="262" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#6B7280">経営者自身が旗振り役に</text>
  <text x="1305" y="289" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#6B7280">小さな成功の積み重ね</text>
  <rect x="1180" y="320" width="250" height="36" rx="18" fill="#7C3AED" opacity="0.1"/>
  <text x="1305" y="344" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7C3AED">期間: 1〜2ヶ月</text>
  <text x="800" y="428" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#6B7280">月額約3,000円（ChatGPT Plus）から開始可能</text>
</svg>
