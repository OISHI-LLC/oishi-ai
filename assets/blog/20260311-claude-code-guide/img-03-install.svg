<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="460" rx="24" fill="url(#bg3)"/>
  <text x="600" y="48" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1E1B4B">インストール 3ステップ</text>
  <text x="600" y="76" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1D4ED8">コピペするだけ！ 5分で完了します</text>

  <!-- Step 1 -->
  <rect x="40" y="100" width="360" height="330" rx="16" fill="#fff"/>
  <circle cx="220" cy="140" r="28" fill="#2563EB" opacity="0.15"/>
  <text x="220" y="149" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2563EB">1</text>
  <text x="220" y="190" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#1E1B4B">ターミナルを開く</text>
  <text x="220" y="220" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">Mac：「ターミナル」アプリを検索</text>
  <text x="220" y="244" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">Windows：「PowerShell」を検索</text>

  <rect x="70" y="268" width="300" height="60" rx="10" fill="#F0F9FF"/>
  <text x="220" y="292" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1D4ED8">ターミナル = パソコンに</text>
  <text x="220" y="312" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1D4ED8">文字で命令を出す画面のこと</text>

  <rect x="70" y="345" width="300" height="60" rx="10" fill="#FEF3C7"/>
  <text x="220" y="370" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#92400E">怖くないです！</text>
  <text x="220" y="390" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#92400E">コピペするだけで大丈夫</text>

  <!-- Arrow -->
  <path d="M410 265 L430 265" stroke="#2563EB" stroke-width="3"/>
  <polygon points="430,259 442,265 430,271" fill="#2563EB"/>

  <!-- Step 2 -->
  <rect x="440" y="100" width="360" height="330" rx="16" fill="#fff"/>
  <circle cx="620" cy="140" r="28" fill="#2563EB" opacity="0.15"/>
  <text x="620" y="149" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2563EB">2</text>
  <text x="620" y="190" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#1E1B4B">コマンドを貼り付け</text>
  <text x="620" y="220" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">Mac の場合：</text>
  <rect x="470" y="232" width="300" height="32" rx="8" fill="#1E293B"/>
  <text x="620" y="253" text-anchor="middle" font-family="monospace" font-size="11" fill="#22D3EE">curl -fsSL https://claude.ai/install.sh | bash</text>
  <text x="620" y="285" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">Windows の場合：</text>
  <rect x="470" y="297" width="300" height="32" rx="8" fill="#1E293B"/>
  <text x="620" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#22D3EE">irm https://claude.ai/install.ps1 | iex</text>

  <rect x="470" y="345" width="300" height="60" rx="10" fill="#DCFCE7"/>
  <text x="620" y="370" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#166534">貼り付けて Enter を押すだけ！</text>
  <text x="620" y="390" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#166534">自動でインストールが始まります</text>

  <!-- Arrow -->
  <path d="M810 265 L830 265" stroke="#2563EB" stroke-width="3"/>
  <polygon points="830,259 842,265 830,271" fill="#2563EB"/>

  <!-- Step 3 -->
  <rect x="840" y="100" width="320" height="330" rx="16" fill="#fff" stroke="#2563EB" stroke-width="2"/>
  <circle cx="1000" cy="140" r="28" fill="#2563EB" opacity="0.15"/>
  <text x="1000" y="149" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#2563EB">3</text>
  <text x="1000" y="190" text-anchor="middle" font-family="sans-serif" font-size="19" font-weight="bold" fill="#1E1B4B">起動してログイン</text>
  <rect x="880" y="210" width="240" height="32" rx="8" fill="#1E293B"/>
  <text x="1000" y="231" text-anchor="middle" font-family="monospace" font-size="15" fill="#22D3EE">claude</text>
  <text x="1000" y="268" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">と入力して Enter</text>
  <text x="1000" y="295" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">ブラウザが開くので</text>
  <text x="1000" y="318" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">アカウントでログイン</text>

  <rect x="870" y="345" width="260" height="60" rx="10" fill="#F5F3FF"/>
  <text x="1000" y="370" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">これで準備完了！</text>
  <text x="1000" y="392" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">さっそく話しかけてみましょう</text>
</svg>