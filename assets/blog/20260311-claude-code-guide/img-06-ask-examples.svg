<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="520" rx="24" fill="url(#bg6)"/>
  <text x="600" y="48" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1E1B4B">こう話しかけると うまくいく！</text>
  <text x="600" y="76" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#0369A1">普通の日本語で大丈夫。堅い言い方は不要です</text>

  <!-- Good examples -->
  <rect x="40" y="100" width="560" height="390" rx="16" fill="#fff" stroke="#16A34A" stroke-width="2"/>
  <rect x="40" y="100" width="560" height="48" rx="16" fill="#16A34A"/>
  <rect x="40" y="124" width="560" height="24" fill="#16A34A"/>
  <text x="320" y="130" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff">うまくいく頼み方</text>

  <rect x="70" y="165" width="500" height="44" rx="10" fill="#F0FDF4"/>
  <text x="320" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#166534">「このフォルダの中身をわかりやすく説明して」</text>

  <rect x="70" y="225" width="500" height="44" rx="10" fill="#F0FDF4"/>
  <text x="320" y="252" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#166534">「ログイン画面が壊れてるっぽい。原因を探して」</text>

  <rect x="70" y="285" width="500" height="44" rx="10" fill="#F0FDF4"/>
  <text x="320" y="312" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#166534">「お問い合わせフォームに名前の入力チェックを追加して」</text>

  <rect x="70" y="345" width="500" height="44" rx="10" fill="#F0FDF4"/>
  <text x="320" y="372" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#166534">「変更する前に、何をどう変えるか計画だけ見せて」</text>

  <rect x="70" y="415" width="500" height="50" rx="10" fill="#DCFCE7"/>
  <text x="320" y="436" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16A34A">コツ：やってほしいことを具体的に伝える</text>
  <text x="320" y="455" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#166534">「何を」「どうしたいか」がはっきりしていればOK</text>

  <!-- Bad examples -->
  <rect x="630" y="100" width="530" height="390" rx="16" fill="#fff" stroke="#DC2626" stroke-width="2"/>
  <rect x="630" y="100" width="530" height="48" rx="16" fill="#DC2626"/>
  <rect x="630" y="124" width="530" height="24" fill="#DC2626"/>
  <text x="895" y="130" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff">うまくいきにくい頼み方</text>

  <rect x="660" y="165" width="470" height="44" rx="10" fill="#FEF2F2"/>
  <text x="895" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#DC2626">「全部いい感じにして」</text>

  <rect x="660" y="225" width="470" height="44" rx="10" fill="#FEF2F2"/>
  <text x="895" y="252" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#DC2626">「なんかバグってるんだけど」</text>

  <rect x="660" y="285" width="470" height="44" rx="10" fill="#FEF2F2"/>
  <text x="895" y="312" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#DC2626">「サービス全体を作り直して」</text>

  <rect x="660" y="345" width="470" height="44" rx="10" fill="#FEF2F2"/>
  <text x="895" y="372" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#DC2626">「とにかく何かやって」</text>

  <rect x="660" y="415" width="470" height="50" rx="10" fill="#FEE2E2"/>
  <text x="895" y="436" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#DC2626">あいまいすぎると、結果もあいまいに</text>
  <text x="895" y="455" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#991B1B">大きすぎるお願いも、うまくいきにくいです</text>
</svg>