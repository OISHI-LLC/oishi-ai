<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#FEF2F2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="500" rx="24" fill="url(#bg2)"/>
  <text x="600" y="50" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1E1B4B">Claude Code が向いている人・まだ早い人</text>

  <!-- 向いている人 -->
  <rect x="40" y="80" width="550" height="390" rx="16" fill="#fff" stroke="#16A34A" stroke-width="2"/>
  <rect x="40" y="80" width="550" height="50" rx="16" fill="#16A34A"/>
  <rect x="40" y="105" width="550" height="25" fill="#16A34A"/>
  <text x="315" y="112" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff">向いている人</text>

  <g transform="translate(80, 160)">
    <circle cx="0" cy="0" r="14" fill="#DCFCE7"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16A34A">✓</text>
    <text x="24" y="5" font-family="sans-serif" font-size="15" fill="#374151">コードベースを読むのが苦手で</text>
    <text x="24" y="24" font-family="sans-serif" font-size="15" fill="#374151">どこから触ればいいか迷う人</text>
  </g>
  <g transform="translate(80, 220)">
    <circle cx="0" cy="0" r="14" fill="#DCFCE7"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16A34A">✓</text>
    <text x="24" y="5" font-family="sans-serif" font-size="15" fill="#374151">エラーやバグの影響範囲を</text>
    <text x="24" y="24" font-family="sans-serif" font-size="15" fill="#374151">一人で追い切れない人</text>
  </g>
  <g transform="translate(80, 280)">
    <circle cx="0" cy="0" r="14" fill="#DCFCE7"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16A34A">✓</text>
    <text x="24" y="5" font-family="sans-serif" font-size="15" fill="#374151">テスト追加やLint修正など</text>
    <text x="24" y="24" font-family="sans-serif" font-size="15" fill="#374151">小さな改修を早く回したい人</text>
  </g>
  <g transform="translate(80, 340)">
    <circle cx="0" cy="0" r="14" fill="#DCFCE7"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#16A34A">✓</text>
    <text x="24" y="5" font-family="sans-serif" font-size="15" fill="#374151">自社ツールの軽微な改修を</text>
    <text x="24" y="24" font-family="sans-serif" font-size="15" fill="#374151">自分で前に進めたい非専業エンジニア</text>
  </g>

  <rect x="80" y="395" width="470" height="48" rx="10" fill="#F0FDF4"/>
  <text x="315" y="425" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#16A34A">探索の補助 → 修正案のたたき台 → 影響範囲の調査役</text>

  <!-- まだ早い人 -->
  <rect x="610" y="80" width="550" height="390" rx="16" fill="#fff" stroke="#DC2626" stroke-width="2"/>
  <rect x="610" y="80" width="550" height="50" rx="16" fill="#DC2626"/>
  <rect x="610" y="105" width="550" height="25" fill="#DC2626"/>
  <text x="885" y="112" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff">まだ早い人</text>

  <g transform="translate(650, 160)">
    <circle cx="0" cy="0" r="14" fill="#FEE2E2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#DC2626">✗</text>
    <text x="24" y="5" font-family="sans-serif" font-size="15" fill="#374151">ターミナル操作がまったく怖くて</text>
    <text x="24" y="24" font-family="sans-serif" font-size="15" fill="#374151">コマンド実行に強い拒否感がある人</text>
  </g>
  <g transform="translate(650, 220)">
    <circle cx="0" cy="0" r="14" fill="#FEE2E2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#DC2626">✗</text>
    <text x="24" y="5" font-family="sans-serif" font-size="15" fill="#374151">コードの変更内容を1行も読まず</text>
    <text x="24" y="24" font-family="sans-serif" font-size="15" fill="#374151">全部任せたい人</text>
  </g>
  <g transform="translate(650, 280)">
    <circle cx="0" cy="0" r="14" fill="#FEE2E2"/>
    <text x="0" y="5" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#DC2626">✗</text>
    <text x="24" y="5" font-family="sans-serif" font-size="15" fill="#374151">本番運用中の重要システムに</text>
    <text x="24" y="24" font-family="sans-serif" font-size="15" fill="#374151">いきなり全面導入しようとしている人</text>
  </g>

  <rect x="650" y="340" width="470" height="100" rx="10" fill="#FEF2F2"/>
  <text x="885" y="370" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#DC2626" font-weight="bold">大事なポイント</text>
  <text x="885" y="395" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">Claude Code は「ノーリスクで全部自動」の</text>
  <text x="885" y="415" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">道具ではない。最終判断は人間が持つのが安全</text>
</svg>