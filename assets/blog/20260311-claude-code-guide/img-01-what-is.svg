<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" rx="24" fill="url(#bg1)"/>
  <text x="600" y="50" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1E1B4B">Claude Code ってなに？</text>

  <!-- Left: Chat AI -->
  <rect x="60" y="85" width="500" height="360" rx="16" fill="#fff"/>
  <rect x="60" y="85" width="500" height="52" rx="16" fill="#94A3B8"/>
  <rect x="60" y="111" width="500" height="26" fill="#94A3B8"/>
  <text x="310" y="118" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff">普通のAIチャット</text>

  <text x="310" y="175" text-anchor="middle" font-family="sans-serif" font-size="42">💬</text>
  <text x="310" y="220" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#374151">質問すると答えが返ってくる</text>
  <text x="310" y="250" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#374151">コードを貼って「これ何？」と聞く</text>

  <rect x="110" y="280" width="400" height="60" rx="10" fill="#F1F5F9"/>
  <text x="310" y="305" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#64748B">「答えをもらったら、</text>
  <text x="310" y="326" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#64748B">あとは自分でやる」スタイル</text>

  <rect x="160" y="365" width="300" height="50" rx="12" fill="#F1F5F9"/>
  <text x="310" y="396" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#94A3B8">相談役</text>

  <!-- Arrow -->
  <text x="590" y="275" text-anchor="middle" font-family="sans-serif" font-size="50" fill="#7C3AED">→</text>

  <!-- Right: Claude Code -->
  <rect x="640" y="85" width="500" height="360" rx="16" fill="#fff" stroke="#7C3AED" stroke-width="2"/>
  <rect x="640" y="85" width="500" height="52" rx="16" fill="#7C3AED"/>
  <rect x="640" y="111" width="500" height="26" fill="#7C3AED"/>
  <text x="890" y="118" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#fff">Claude Code</text>

  <text x="890" y="175" text-anchor="middle" font-family="sans-serif" font-size="42">🤖</text>
  <text x="890" y="220" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#374151">ファイルを読んで、直して、保存までやる</text>
  <text x="890" y="250" text-anchor="middle" font-family="sans-serif" font-size="17" fill="#374151">「ここ直して」と言えば作業してくれる</text>

  <rect x="690" y="280" width="400" height="60" rx="10" fill="#F5F3FF"/>
  <text x="890" y="305" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#6D28D9">「一緒に作業してくれる</text>
  <text x="890" y="326" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#6D28D9">頼れるパートナー」スタイル</text>

  <rect x="740" y="365" width="300" height="50" rx="12" fill="#F5F3FF"/>
  <text x="890" y="396" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7C3AED">一緒に手を動かす仲間</text>
</svg>