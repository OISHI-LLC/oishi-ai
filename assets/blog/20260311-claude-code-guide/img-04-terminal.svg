<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
  <rect width="1200" height="500" rx="24" fill="#F8FAFC"/>
  <text x="600" y="40" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#1E1B4B">ターミナルの画面イメージ</text>
  <text x="600" y="66" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">こんな黒い画面です。怖くないので安心してください！</text>

  <!-- Terminal Window -->
  <rect x="100" y="90" width="1000" height="380" rx="12" fill="#1E1B2E"/>
  <!-- Title bar -->
  <rect x="100" y="90" width="1000" height="36" rx="12" fill="#2D2B3D"/>
  <rect x="100" y="114" width="1000" height="12" fill="#2D2B3D"/>
  <circle cx="128" cy="108" r="7" fill="#FF5F56"/>
  <circle cx="152" cy="108" r="7" fill="#FFBD2E"/>
  <circle cx="176" cy="108" r="7" fill="#27C93F"/>
  <text x="600" y="113" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#8B8A9E">ターミナル</text>

  <!-- Line 1: prompt -->
  <text x="130" y="155" font-family="monospace" font-size="15" fill="#27C93F">$</text>
  <text x="150" y="155" font-family="monospace" font-size="15" fill="#E2E0F0">claude</text>
  <text x="600" y="155" font-family="sans-serif" font-size="13" fill="#8B8A9E">← ここに「claude」と打って Enter</text>

  <!-- Line 2: welcome -->
  <text x="130" y="190" font-family="monospace" font-size="14" fill="#A78BFA">╭─────────────────────────────────────────────────────╮</text>
  <text x="130" y="215" font-family="monospace" font-size="14" fill="#A78BFA">│</text>
  <text x="155" y="215" font-family="monospace" font-size="14" fill="#E2E0F0">Welcome to Claude Code!</text>
  <text x="130" y="240" font-family="monospace" font-size="14" fill="#A78BFA">│</text>
  <text x="155" y="240" font-family="monospace" font-size="14" fill="#8B8A9E">Type your message or /help for commands</text>
  <text x="130" y="265" font-family="monospace" font-size="14" fill="#A78BFA">╰─────────────────────────────────────────────────────╯</text>

  <!-- Line 3: user input -->
  <text x="130" y="305" font-family="monospace" font-size="14" fill="#22D3EE">You:</text>
  <text x="185" y="305" font-family="monospace" font-size="14" fill="#E2E0F0">このプロジェクトは何をするものですか？</text>

  <!-- Line 4: Claude response -->
  <text x="130" y="340" font-family="monospace" font-size="14" fill="#A78BFA">Claude:</text>
  <text x="210" y="340" font-family="monospace" font-size="14" fill="#E2E0F0">このプロジェクトはWebサイトです。</text>
  <text x="210" y="365" font-family="monospace" font-size="14" fill="#E2E0F0">主なファイルは index.html と style.css で、</text>
  <text x="210" y="390" font-family="monospace" font-size="14" fill="#E2E0F0">お問い合わせフォーム機能があります。</text>

  <!-- Line 5: cursor -->
  <text x="130" y="430" font-family="monospace" font-size="14" fill="#22D3EE">You:</text>
  <rect x="185" y="418" width="10" height="18" fill="#22D3EE" opacity="0.7"/>
  <text x="600" y="430" font-family="sans-serif" font-size="13" fill="#8B8A9E">← 日本語で話しかけるだけ！</text>
</svg>