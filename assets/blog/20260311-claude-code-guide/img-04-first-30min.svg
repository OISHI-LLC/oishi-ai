<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBEB"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="480" rx="24" fill="url(#bg4)"/>
  <text x="600" y="48" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#1E1B4B">最初の30分でやること</text>
  <text x="600" y="76" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#92400E">探索 → 提案 → 小変更 → 確認 の順序を守る</text>

  <!-- Timeline line -->
  <line x1="100" y1="130" x2="1100" y2="130" stroke="#F59E0B" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- Step 1 -->
  <circle cx="140" cy="130" r="20" fill="#F59E0B"/>
  <text x="140" y="136" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">1</text>
  <rect x="60" y="165" width="200" height="140" rx="12" fill="#fff"/>
  <text x="160" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1E1B4B">起動</text>
  <text x="160" y="218" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">プロジェクト直下で</text>
  <rect x="90" y="235" width="140" height="28" rx="6" fill="#1E293B"/>
  <text x="160" y="254" text-anchor="middle" font-family="monospace" font-size="13" fill="#22D3EE">claude</text>
  <text x="160" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400E">0〜1分</text>

  <!-- Step 2 -->
  <circle cx="340" cy="130" r="20" fill="#F59E0B"/>
  <text x="340" y="136" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">2</text>
  <rect x="250" y="165" width="200" height="140" rx="12" fill="#fff"/>
  <text x="350" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1E1B4B">全体像を聞く</text>
  <text x="350" y="218" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">「このプロジェクトは</text>
  <text x="350" y="236" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">何をするもの？」</text>
  <text x="350" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">構造・役割を把握</text>
  <text x="350" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400E">5〜10分</text>

  <!-- Step 3 -->
  <circle cx="540" cy="130" r="20" fill="#F59E0B"/>
  <text x="540" y="136" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">3</text>
  <rect x="450" y="165" width="200" height="140" rx="12" fill="#fff"/>
  <text x="550" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1E1B4B">主要ファイル特定</text>
  <text x="550" y="218" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">エントリポイント、</text>
  <text x="550" y="236" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">認証、DB接続など</text>
  <text x="550" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">核心の場所を絞り込む</text>
  <text x="550" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400E">5分</text>

  <!-- Step 4 -->
  <circle cx="740" cy="130" r="20" fill="#F59E0B"/>
  <text x="740" y="136" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">4</text>
  <rect x="650" y="165" width="200" height="140" rx="12" fill="#fff"/>
  <text x="750" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1E1B4B">小さな変更を1つ</text>
  <text x="750" y="218" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">README更新、</text>
  <text x="750" y="236" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">テスト追加、文言修正</text>
  <text x="750" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">影響の小さいタスク1件</text>
  <text x="750" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400E">10分</text>

  <!-- Step 5 -->
  <circle cx="940" cy="130" r="20" fill="#F59E0B"/>
  <text x="940" y="136" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fff">5</text>
  <rect x="850" y="165" width="200" height="140" rx="12" fill="#fff" stroke="#F59E0B" stroke-width="2"/>
  <text x="950" y="192" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1E1B4B">変更内容を確認</text>
  <text x="950" y="218" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">差分の意味を理解</text>
  <text x="950" y="236" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">なぜその操作をしたか</text>
  <text x="950" y="260" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">承認前に必ず見る</text>
  <text x="950" y="280" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#92400E">5分</text>

  <!-- Bottom message -->
  <rect x="200" y="330" width="800" height="120" rx="16" fill="#fff" stroke="#F59E0B" stroke-width="2"/>
  <text x="600" y="365" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#92400E">初回で避けるべき頼み方</text>
  <text x="600" y="400" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#DC2626">「このサービス全部改善して」「何でもいいからリファクタして」</text>
  <text x="600" y="425" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6B7280">最初の30分で得るべきものは完成品ではなく、Claude Code との役割分担の感覚</text>
</svg>